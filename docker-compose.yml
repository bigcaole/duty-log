version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: duty-log-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: duty_log
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d duty_log"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: duty-log-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5001"
    volumes:
      - ./backups:/app/backups
      - ./fonts:/app/fonts
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:5001/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
