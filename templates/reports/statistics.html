<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <div class="flex gap-2">
        <a href="/reports" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回周报</a>
        <a href="/dashboard" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回仪表板</a>
      </div>
    </div>

    <div class="grid md:grid-cols-5 gap-4 mb-6">
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-xs text-gray-500">{{.UserCountLabel}}</div>
        <div class="text-3xl font-bold mt-2">{{.UserCount}}</div>
      </div>
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-xs text-gray-500">IDC 值班</div>
        <div class="text-3xl font-bold mt-2">{{.DutyCount}}</div>
      </div>
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-xs text-gray-500">普通工单</div>
        <div class="text-3xl font-bold mt-2">{{.TicketCount}}</div>
      </div>
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-xs text-gray-500">网络工单</div>
        <div class="text-3xl font-bold mt-2">{{.WorkTicketCount}}</div>
      </div>
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-xs text-gray-500">故障记录</div>
        <div class="text-3xl font-bold mt-2">{{.FaultCount}}</div>
      </div>
    </div>

    <div class="grid lg:grid-cols-2 gap-4">
      <section class="bg-white dark:bg-gray-800 rounded-xl shadow p-4">
        <h2 class="font-semibold mb-3">最近7天</h2>
        <div class="space-y-2 text-sm">
          <div class="flex items-center justify-between"><span>IDC 值班</span><strong>{{.RecentDuty}}</strong></div>
          <div class="flex items-center justify-between"><span>网络工单</span><strong>{{.RecentWork}}</strong></div>
          <div class="flex items-center justify-between"><span>故障记录</span><strong>{{.RecentFault}}</strong></div>
        </div>
      </section>

      <section class="bg-white dark:bg-gray-800 rounded-xl shadow p-4">
        <h2 class="font-semibold mb-3">总量分布</h2>
        <div class="space-y-3">
          {{range .Charts}}
          <div>
            <div class="flex justify-between text-sm mb-1"><span>{{.Name}}</span><span>{{.Count}}</span></div>
            <div class="h-2 rounded bg-gray-200 dark:bg-gray-700 overflow-hidden">
              <div class="h-full bg-blue-500" style="width: {{if gt .Count 0}}{{.Count}}{{else}}1{{end}}%; max-width: 100%;"></div>
            </div>
          </div>
          {{end}}
        </div>
      </section>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
