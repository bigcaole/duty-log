<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <a href="/dashboard" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回仪表板</a>
    </div>
    <div class="grid md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6">
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-sm text-gray-500">用户数</div>
        <div class="text-3xl font-bold mt-2">{{.UserCount}}</div>
      </div>
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-sm text-gray-500">IDC 值班记录</div>
        <div class="text-3xl font-bold mt-2">{{.IDCDutyCount}}</div>
      </div>
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-sm text-gray-500">网络工单</div>
        <div class="text-3xl font-bold mt-2">{{.WorkTicketCount}}</div>
      </div>
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-sm text-gray-500">故障记录</div>
        <div class="text-3xl font-bold mt-2">{{.FaultCount}}</div>
      </div>
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-sm text-gray-500">审计日志</div>
        <div class="text-3xl font-bold mt-2">{{.AuditCount}}</div>
      </div>
      <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4">
        <div class="text-sm text-gray-500">备份通知</div>
        <div class="text-3xl font-bold mt-2">{{.BackupCount}}</div>
      </div>
    </div>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
      <a href="/admin/users" class="rounded-xl bg-white dark:bg-gray-800 shadow p-4 hover:shadow-lg">
        <h3 class="font-semibold">用户管理</h3>
        <p class="text-sm text-gray-500 mt-1">创建、编辑、禁用账号</p>
      </a>
      <a href="/admin/categories" class="rounded-xl bg-white dark:bg-gray-800 shadow p-4 hover:shadow-lg">
        <h3 class="font-semibold">分类管理</h3>
        <p class="text-sm text-gray-500 mt-1">工单分类与事项分类</p>
      </a>
      <a href="/admin/work-ticket-types" class="rounded-xl bg-white dark:bg-gray-800 shadow p-4 hover:shadow-lg">
        <h3 class="font-semibold">工单类型</h3>
        <p class="text-sm text-gray-500 mt-1">网络工单类型维护</p>
      </a>
      <a href="/admin/fault-types" class="rounded-xl bg-white dark:bg-gray-800 shadow p-4 hover:shadow-lg">
        <h3 class="font-semibold">故障类型</h3>
        <p class="text-sm text-gray-500 mt-1">故障类型维护</p>
      </a>
      <a href="/admin/config" class="rounded-xl bg-white dark:bg-gray-800 shadow p-4 hover:shadow-lg">
        <h3 class="font-semibold">系统配置</h3>
        <p class="text-sm text-gray-500 mt-1">动态配置与密钥管理</p>
      </a>
      <a href="/admin/audit-logs" class="rounded-xl bg-white dark:bg-gray-800 shadow p-4 hover:shadow-lg">
        <h3 class="font-semibold">审计日志</h3>
        <p class="text-sm text-gray-500 mt-1">操作轨迹与变更记录</p>
      </a>
      <a href="/admin/backup-notifications" class="rounded-xl bg-white dark:bg-gray-800 shadow p-4 hover:shadow-lg">
        <h3 class="font-semibold">备份通知</h3>
        <p class="text-sm text-gray-500 mt-1">备份结果、密码与下载</p>
      </a>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
