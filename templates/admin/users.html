<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <div class="flex gap-2">
        <a href="/admin" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回后台</a>
        <a href="/admin/users/create" class="px-3 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">新建用户</a>
      </div>
    </div>

    {{if .Msg}}<div class="mb-3 rounded-lg bg-emerald-100 text-emerald-700 px-3 py-2">{{.Msg}}</div>{{end}}
    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-xl shadow">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th class="px-3 py-2 text-left">用户名</th>
            <th class="px-3 py-2 text-left">邮箱</th>
            <th class="px-3 py-2 text-left">状态</th>
            <th class="px-3 py-2 text-left">管理员</th>
            <th class="px-3 py-2 text-left">2FA</th>
            <th class="px-3 py-2 text-left">创建时间</th>
            <th class="px-3 py-2 text-right">操作</th>
          </tr>
        </thead>
        <tbody>
          {{range .Items}}
          <tr class="border-t border-gray-100 dark:border-gray-700">
            <td class="px-3 py-2">{{.Username}}</td>
            <td class="px-3 py-2">{{.Email}}</td>
            <td class="px-3 py-2">{{if .IsActive}}启用{{else}}停用{{end}}</td>
            <td class="px-3 py-2">{{if .IsAdmin}}是{{else}}否{{end}}</td>
            <td class="px-3 py-2">{{if .Has2FA}}已启用{{else}}未启用{{end}}</td>
            <td class="px-3 py-2">{{.CreatedAt}}</td>
            <td class="px-3 py-2 text-right">
              <a href="/admin/users/{{.ID}}/edit" class="text-blue-600 hover:underline">编辑</a>
              <form method="post" action="/admin/users/{{.ID}}/delete" class="inline" onsubmit="return confirm('确认删除该用户？');">
                <button type="submit" class="ml-2 text-red-600 hover:underline">删除</button>
              </form>
            </td>
          </tr>
          {{else}}
          <tr><td class="px-3 py-8 text-center text-gray-500" colspan="7">暂无用户</td></tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
