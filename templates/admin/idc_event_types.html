<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
  <script id="theme-preload">
    (function(){
      try {
        var pref = localStorage.getItem("theme-preference") || "auto";
        var mode = pref;
        if (pref === "auto") {
          mode = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        if (mode === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        document.documentElement.setAttribute("data-theme-preference", pref);
      } catch (e) {}
    })();
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="min-h-screen lg:grid lg:grid-cols-[260px_1fr]">
    {{template "partials/sidebar.html" .}}
    <main data-app-main="true" class="p-4 md:p-6">
  <div class="max-w-5xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <a href="/admin" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回后台</a>
    </div>
    {{if .Msg}}<div class="mb-3 rounded-lg bg-emerald-100 text-emerald-700 px-3 py-2">{{.Msg}}</div>{{end}}
    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <div class="rounded-xl bg-white dark:bg-gray-800 shadow p-4 mb-4">
      <h2 class="text-lg font-semibold mb-3">新增 IDC 事件类型</h2>
      <form method="post" action="/admin/idc-event-types/create" class="grid grid-cols-1 md:grid-cols-3 gap-2">
        <input name="name" type="text" placeholder="类型名称" required class="rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        <input name="description" type="text" placeholder="描述" class="rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        <button type="submit" class="rounded-lg bg-blue-600 text-white px-3 py-2">快速添加</button>
      </form>
    </div>

    <div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-xl shadow">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 dark:bg-gray-700"><tr><th class="px-3 py-2 text-left">名称</th><th class="px-3 py-2 text-left">描述</th><th class="px-3 py-2 text-right">操作</th></tr></thead>
        <tbody>
          {{range .Items}}
          <tr class="border-t border-gray-100 dark:border-gray-700">
            <td class="px-3 py-2">{{.Name}}</td>
            <td class="px-3 py-2">{{.Description}}</td>
            <td class="px-3 py-2 text-right">
              <a href="/admin/idc-event-types/{{.ID}}/edit" class="text-blue-600 hover:underline">编辑</a>
              <form method="post" action="/admin/idc-event-types/{{.ID}}/delete" class="inline" onsubmit="return confirm('确认删除？');">
                <button type="submit" class="ml-2 text-red-600 hover:underline">删除</button>
              </form>
            </td>
          </tr>
          {{else}}<tr><td class="px-3 py-8 text-center text-gray-500" colspan="3">暂无数据</td></tr>{{end}}
        </tbody>
      </table>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
    </main>
  </div>
</body>
</html>
