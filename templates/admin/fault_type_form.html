<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
  <script id="theme-preload">
    (function(){
      try {
        var pref = localStorage.getItem("theme-preference") || "auto";
        var mode = pref;
        if (pref === "auto") {
          mode = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        if (mode === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        document.documentElement.setAttribute("data-theme-preference", pref);
      } catch (e) {}
    })();
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="min-h-screen lg:grid lg:grid-cols-[260px_1fr]">
    {{template "partials/sidebar.html" .}}
    <main data-app-main="true" class="p-4 md:p-6">
  <div class="max-w-2xl mx-auto p-4 md:p-6">
    <div class="mb-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <a href="/admin/fault-types" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回列表</a>
    </div>
    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}
    <form method="post" action="{{.Action}}" class="space-y-4 bg-white dark:bg-gray-800 rounded-xl shadow p-4 md:p-6">
      <div>
        <label class="text-sm font-medium">名称</label>
        <input name="name" type="text" value="{{.Form.Name}}" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
      </div>
      <div>
        <label class="text-sm font-medium">描述</label>
        <textarea name="description" rows="4" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">{{.Form.Description}}</textarea>
      </div>
      <div class="flex justify-end gap-3">
        <a href="/admin/fault-types" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600">取消</a>
        <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">保存</button>
      </div>
    </form>
  </div>
  <script src="/static/js/theme.js"></script>
    </main>
  </div>
</body>
</html>
