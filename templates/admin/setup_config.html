<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-4 md:p-6">
    <div class="mb-4">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <p class="text-sm text-gray-600 dark:text-gray-300 mt-1">首次进入系统，请先完成必要配置。其余 {{.OptionalCount}} 项可稍后在“系统配置”中按需设置。</p>
    </div>

    {{if .Msg}}<div class="mb-3 rounded-lg bg-emerald-100 text-emerald-700 px-3 py-2">{{.Msg}}</div>{{end}}
    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <form method="post" action="/admin/setup/config" class="bg-white dark:bg-gray-800 rounded-xl shadow p-4 md:p-6 space-y-4">
      {{range .Items}}
      <div>
        <label class="block text-sm font-medium mb-1" for="{{.Key}}">{{.Key}}</label>
        {{if eq .Key "BACKUP_ENABLED"}}
        <select id="{{.Key}}" name="{{.Key}}" class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
          <option value="false" {{if eq .Value "false"}}selected{{end}}>false（默认）</option>
          <option value="true" {{if eq .Value "true"}}selected{{end}}>true</option>
        </select>
        {{else}}
        <input id="{{.Key}}" name="{{.Key}}" type="text" value="{{.Value}}" required class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        {{end}}
        <p class="text-xs text-gray-500 mt-1">{{.Description}}</p>
      </div>
      {{end}}

      <div class="flex items-center justify-between">
        <a href="/admin/config" class="text-sm text-blue-600 hover:underline">查看全部系统配置</a>
        <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">保存并进入系统</button>
      </div>
    </form>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
