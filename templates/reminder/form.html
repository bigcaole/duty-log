<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-3xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <a href="/reminders" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回列表</a>
    </div>

    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <form method="post" action="{{.Action}}" class="bg-white dark:bg-gray-800 rounded-xl shadow p-4 md:p-6 space-y-4">
      <div>
        <label for="title" class="block text-sm font-medium mb-1">提醒标题</label>
        <input id="title" name="title" type="text" required value="{{.Form.Title}}" class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
      </div>

      <div>
        <label for="content" class="block text-sm font-medium mb-1">内容说明</label>
        <textarea id="content" name="content" rows="5" class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">{{.Form.Content}}</textarea>
      </div>

      <div class="grid md:grid-cols-3 gap-3">
        <div>
          <label for="start_date" class="block text-sm font-medium mb-1">开始日期</label>
          <input id="start_date" name="start_date" type="date" required value="{{.Form.StartDate}}" class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label for="end_date" class="block text-sm font-medium mb-1">结束日期</label>
          <input id="end_date" name="end_date" type="date" required value="{{.Form.EndDate}}" class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label for="remind_days_before" class="block text-sm font-medium mb-1">提前提醒天数</label>
          <input id="remind_days_before" name="remind_days_before" type="number" min="0" max="365" required value="{{.Form.RemindDaysBefore}}" class="w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>

      <div class="flex justify-end">
        <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">保存</button>
      </div>
    </form>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
