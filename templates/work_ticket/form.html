<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-4 md:p-6">
    <div class="mb-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <a href="/work-tickets" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回列表</a>
    </div>
    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <form method="post" action="{{.Action}}" enctype="multipart/form-data" class="space-y-4 bg-white dark:bg-gray-800 rounded-xl shadow p-4 md:p-6">
      <div class="grid md:grid-cols-3 gap-4">
        <div>
          <label class="text-sm font-medium">日期</label>
          <input name="date" type="date" value="{{.Form.Date}}" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label class="text-sm font-medium">工单类型</label>
          <select name="work_ticket_type_id" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
            <option value="">请选择</option>
            {{range .TicketTypes}}
            <option value="{{.ID}}" {{if eq $.Form.WorkTicketTypeID (printf "%d" .ID)}}selected{{end}}>{{.Name}}</option>
            {{end}}
          </select>
        </div>
        <div>
          <label class="text-sm font-medium">处理状态</label>
          <select name="processing_status" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
            {{range .Statuses}}
            <option value="{{.}}" {{if eq $.Form.ProcessingStatus .}}selected{{end}}>{{.}}</option>
            {{end}}
          </select>
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-medium">值班人员</label>
          <input name="duty_person" type="text" value="{{.Form.DutyPerson}}" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label class="text-sm font-medium">用户名</label>
          <input name="user_name" type="text" value="{{.Form.UserName}}" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-medium">所属单位</label>
          <input name="ticket_organization" type="text" value="{{.Form.TicketOrganization}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label class="text-sm font-medium">客服人员</label>
          <input name="customer_service_person" type="text" value="{{.Form.CustomerServicePerson}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>

      <div>
        <label class="text-sm font-medium">操作信息</label>
        <textarea name="operation_info" rows="6" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">{{.Form.OperationInfo}}</textarea>
      </div>
      <div>
        <label class="text-sm font-medium">备注</label>
        <textarea name="remarks" rows="4" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">{{.Form.Remarks}}</textarea>
      </div>
      <div>
        <label class="text-sm font-medium">附件上传（支持图片和任意文件，不限制文件大小）</label>
        <input name="attachments" type="file" multiple class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
      </div>

      {{if .Form.Attachments}}
      <div class="rounded-lg bg-gray-50 dark:bg-gray-900 p-3">
        <div class="font-medium mb-2">已上传附件</div>
        <div class="space-y-1 text-sm">
          {{range .Form.Attachments}}
          <div>
            <a href="{{.URL}}" target="_blank" class="text-blue-600 hover:underline">{{.Name}}</a>
            <span class="text-gray-500">({{.SizeText}})</span>
          </div>
          {{end}}
        </div>
      </div>
      {{end}}

      <div class="flex justify-end gap-3">
        <a href="/work-tickets" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600">取消</a>
        <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">保存</button>
      </div>
    </form>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
