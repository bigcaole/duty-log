<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
  <script id="theme-preload">
    (function(){
      try {
        var pref = localStorage.getItem("theme-preference") || "auto";
        var mode = pref;
        if (pref === "auto") {
          mode = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        if (mode === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        document.documentElement.setAttribute("data-theme-preference", pref);
      } catch (e) {}
    })();
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="min-h-screen lg:grid lg:grid-cols-[260px_1fr]">
    {{template "partials/sidebar.html" .}}
    <main data-app-main="true" class="p-4 md:p-6">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <div class="flex gap-2">
        <a href="/dashboard" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回仪表板</a>
        {{if .CanManage}}<a href="/instructions/create" class="px-3 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">新建说明</a>{{end}}
      </div>
    </div>

    {{if .Msg}}<div class="mb-3 rounded-lg bg-emerald-100 text-emerald-700 px-3 py-2">{{.Msg}}</div>{{end}}
    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <div class="space-y-3">
      {{range .Items}}
      <article class="bg-white dark:bg-gray-800 rounded-xl shadow p-4">
        <div class="flex items-start justify-between gap-2">
          <div>
            <h2 class="text-lg font-semibold">{{.Title}}</h2>
            <p class="text-xs text-gray-500 mt-1">更新时间：{{.UpdatedAt.Format "2006-01-02 15:04:05"}}</p>
          </div>
          {{if $.CanManage}}
          <div class="shrink-0 text-sm">
            <a href="/instructions/{{.ID}}/edit" class="text-blue-600 hover:underline">编辑</a>
            <form method="post" action="/instructions/{{.ID}}/delete" class="inline" onsubmit="return confirm('确认删除该说明？');">
              <button type="submit" class="ml-2 text-red-600 hover:underline">删除</button>
            </form>
          </div>
          {{end}}
        </div>
        <pre class="whitespace-pre-wrap text-sm mt-3 text-gray-700 dark:text-gray-200">{{.Content}}</pre>
      </article>
      {{else}}
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-6 text-center text-gray-500">暂无操作说明</div>
      {{end}}
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
    </main>
  </div>
</body>
</html>
