<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-4 md:p-6">
    <div class="mb-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <a href="/idc-ops-tickets" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回列表</a>
    </div>
    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <form method="post" action="{{.Action}}" enctype="multipart/form-data" class="space-y-4 bg-white dark:bg-gray-800 rounded-xl shadow p-4 md:p-6">
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-medium">日期</label>
          <input name="date" type="date" value="{{.Form.Date}}" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label class="text-sm font-medium">来访人员数量</label>
          <input name="visitor_count" type="number" min="1" value="{{.Form.VisitorCount}}" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>

      <div>
        <label class="text-sm font-medium">来访人员单位</label>
        <input name="visitor_organization" type="text" value="{{.Form.VisitorOrganization}}" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
      </div>

      <div>
        <label class="text-sm font-medium">来访人员事由</label>
        <textarea name="visitor_reason" rows="5" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">{{.Form.VisitorReason}}</textarea>
      </div>

      <div class="rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50/60 dark:bg-gray-900/40 p-4 space-y-3">
        <div class="flex items-center gap-2">
          <input name="reminder_enabled" type="checkbox" class="h-4 w-4" {{if .Form.ReminderEnabled}}checked{{end}}>
          <span class="text-sm font-medium">同步添加到提醒</span>
          <span class="text-xs text-gray-500">到期需手动确认，否则会持续在首页提醒</span>
        </div>
        <div class="grid md:grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-gray-500">提醒日期</label>
            <input name="reminder_date" type="date" value="{{.Form.ReminderDate}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-xs text-gray-500">提前提醒天数</label>
            <input name="reminder_days_before" type="number" min="0" max="365" value="{{.Form.ReminderDaysBefore}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2 text-sm">
          </div>
        </div>
        <div>
          <label class="text-xs text-gray-500">提醒标题（可选）</label>
          <input name="reminder_title" type="text" value="{{.Form.ReminderTitle}}" placeholder="默认使用工单信息生成" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2 text-sm">
        </div>
        <div>
          <label class="text-xs text-gray-500">提醒内容（可选）</label>
          <textarea name="reminder_content" rows="3" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2 text-sm">{{.Form.ReminderContent}}</textarea>
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-medium">客服人员</label>
          <input name="customer_service_person" type="text" value="{{.Form.CustomerService}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label class="text-sm font-medium">备注</label>
          <input name="remarks" type="text" value="{{.Form.Remarks}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>

      <div>
        <label class="text-sm font-medium">附件上传（支持图片和任意文件，不限制文件大小）</label>
        <input name="attachments" type="file" multiple class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
      </div>

      {{if .Form.Attachments}}
      <div class="rounded-lg bg-gray-50 dark:bg-gray-900 p-3">
        <div class="font-medium mb-2">已上传附件</div>
        <div class="space-y-1 text-sm">
          {{range .Form.Attachments}}
          <div>
            <a href="{{.URL}}" target="_blank" class="text-blue-600 hover:underline">{{.Name}}</a>
            <span class="text-gray-500">({{.SizeText}})</span>
          </div>
          {{end}}
        </div>
      </div>
      {{end}}

      <div class="flex justify-end gap-3">
        <a href="/idc-ops-tickets" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600">取消</a>
        <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">保存</button>
      </div>
    </form>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
