<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-4 md:p-6">
    <div class="mb-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <a href="/fault-records" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回列表</a>
    </div>
    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <form method="post" action="{{.Action}}" enctype="multipart/form-data" class="space-y-4 bg-white dark:bg-gray-800 rounded-xl shadow p-4 md:p-6">
      <div class="grid md:grid-cols-3 gap-4">
        <div>
          <label class="text-sm font-medium">日期</label>
          <input name="date" type="text" value="{{.Form.Date}}" required placeholder="YYYY-MM-DD" class="date-input mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label class="text-sm font-medium">状态</label>
          <select name="status" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
            {{range .Statuses}}
            <option value="{{.Value}}" {{if eq $.Form.Status .Value}}selected{{end}}>{{.Label}}</option>
            {{end}}
          </select>
        </div>
        <div>
          <label class="text-sm font-medium">处理状态</label>
          <select name="processing_status" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
            {{range .ProcessingStatus}}
            <option value="{{.Value}}" {{if eq $.Form.ProcessingStatus .Value}}selected{{end}}>{{.Label}}</option>
            {{end}}
          </select>
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-medium">值班人员</label>
          <input name="duty_person" type="text" value="{{.Form.DutyPerson}}" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label class="text-sm font-medium">用户名</label>
          <input name="user_name" type="text" value="{{.Form.UserName}}" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-medium">故障类型</label>
          <select name="fault_type_id" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
            <option value="">请选择</option>
            {{range .FaultTypes}}
            <option value="{{.ID}}" {{if eq $.Form.FaultTypeID (printf "%d" .ID)}}selected{{end}}>{{.Name}}</option>
            {{end}}
          </select>
        </div>
        <div>
          <label class="text-sm font-medium">客服人员</label>
          <input name="customer_service_person" type="text" value="{{.Form.CustomerServicePerson}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-medium">受理时间</label>
          <input name="received_time" type="datetime-local" value="{{.Form.ReceivedTime}}" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label class="text-sm font-medium">完成时间</label>
          <input name="completed_time" type="datetime-local" value="{{.Form.CompletedTime}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>

      <div>
        <label class="text-sm font-medium">故障现象</label>
        <textarea name="fault_symptom" rows="4" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">{{.Form.FaultSymptom}}</textarea>
      </div>
      <div>
        <label class="text-sm font-medium">处理过程</label>
        <textarea name="processing_process" rows="5" required class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">{{.Form.ProcessingProcess}}</textarea>
      </div>
      <div class="rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50/60 dark:bg-gray-900/40 p-4" data-reminder-card data-reminder-enabled="{{if .Form.ReminderEnabled}}true{{else}}false{{end}}" data-reminder-expanded="false">
        <div class="flex items-center justify-between gap-3">
          <div>
            <div class="text-sm font-medium">同步添加到提醒</div>
            <div class="text-xs text-gray-500">到期需手动确认，否则会持续在首页提醒</div>
          </div>
          <div class="flex items-center gap-2">
            <button type="button" data-reminder-toggle class="px-3 py-1 rounded-full text-xs text-white bg-gray-500">已关闭</button>
            <button type="button" data-reminder-expand class="px-3 py-1 rounded-full text-xs border border-gray-300 dark:border-gray-600">展开</button>
          </div>
        </div>
        <input type="hidden" name="reminder_enabled" data-reminder-enabled-input value="{{if .Form.ReminderEnabled}}1{{else}}0{{end}}">
        <div class="mt-3 space-y-3" data-reminder-fields style="display:none">
          <div class="grid md:grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-gray-500">提醒日期</label>
              <input name="reminder_date" type="text" value="{{.Form.ReminderDate}}" placeholder="YYYY-MM-DD" class="date-input mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2 text-sm">
            </div>
            <div>
              <label class="text-xs text-gray-500">提前提醒天数</label>
              <input name="reminder_days_before" type="number" min="0" max="365" value="{{.Form.ReminderDaysBefore}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2 text-sm">
            </div>
          </div>
          <div>
            <label class="text-xs text-gray-500">提醒时间</label>
            <input name="reminder_time" type="time" value="{{.Form.ReminderTime}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-xs text-gray-500">提醒标题（可选）</label>
            <input name="reminder_title" type="text" value="{{.Form.ReminderTitle}}" placeholder="默认使用故障信息生成" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-xs text-gray-500">提醒内容（可选）</label>
            <textarea name="reminder_content" rows="3" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2 text-sm">{{.Form.ReminderContent}}</textarea>
          </div>
        </div>
      </div>
      <div>
        <label class="text-sm font-medium">备注</label>
        <textarea name="remarks" rows="4" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">{{.Form.Remarks}}</textarea>
      </div>
      <div>
        <label class="text-sm font-medium">附件上传（支持图片和任意文件，不限制文件大小）</label>
        <input name="attachments" type="file" multiple class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
      </div>

      {{if .Form.Attachments}}
      <div class="rounded-lg bg-gray-50 dark:bg-gray-900 p-3">
        <div class="font-medium mb-2">已上传附件</div>
        <div class="space-y-2 text-sm">
          {{range .Form.Attachments}}
          <div class="flex items-center gap-3">
            {{if .IsImage}}
            <a href="{{.URL}}" target="_blank">
              <img src="{{.URL}}" alt="{{.Name}}" class="h-16 w-16 rounded object-cover border border-gray-200 dark:border-gray-700">
            </a>
            {{end}}
            <div>
              <a href="{{.URL}}" target="_blank" class="text-blue-600 hover:underline">{{.Name}}</a>
              <span class="text-gray-500">({{.SizeText}})</span>
            </div>
            {{if .DeleteValue}}
            <label class="ml-auto flex items-center gap-1 text-xs text-red-600">
              <input type="checkbox" name="remove_attachments" value="{{.DeleteValue}}">
              删除
            </label>
            {{end}}
          </div>
          {{end}}
        </div>
      </div>
      {{end}}

      <div class="flex justify-end gap-3">
        <a href="/fault-records" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600">取消</a>
        <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">保存</button>
      </div>
    </form>
  </div>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/reminder_toggle.js"></script>
  <script src="/static/js/date_input.js"></script>
</body>
</html>
