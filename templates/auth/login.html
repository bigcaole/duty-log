<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body data-no-sidebar="true" class="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-4">
  <div class="w-full max-w-md rounded-2xl bg-white dark:bg-slate-800 shadow-xl p-6">
    <h1 class="text-2xl font-bold">登录系统</h1>
    <p class="text-sm text-slate-500 dark:text-slate-300 mt-1">请输入用户名与密码</p>

    {{if .Error}}
    <div class="mt-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 dark:bg-red-900/30 dark:text-red-200 dark:border-red-700">{{.Error}}</div>
    {{end}}

    <form method="post" action="/auth/login" class="mt-5 space-y-4">
      <div>
        <label class="text-sm font-medium" for="username">用户名</label>
        <input id="username" name="username" type="text" autocomplete="username" required class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="text-sm font-medium" for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit" class="w-full rounded-lg bg-blue-600 hover:bg-blue-700 text-white py-2 font-medium">登录</button>
    </form>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
