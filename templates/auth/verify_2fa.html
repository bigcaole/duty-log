<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
  <script id="theme-preload">
    (function(){
      try {
        var pref = localStorage.getItem("theme-preference") || "auto";
        var mode = pref;
        if (pref === "auto") {
          mode = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        if (mode === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        document.documentElement.setAttribute("data-theme-preference", pref);
      } catch (e) {}
    })();
  </script>
</head>
<body data-no-sidebar="true" class="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-4">
  <div class="w-full max-w-md rounded-2xl bg-white dark:bg-slate-800 shadow-xl p-6">
    <h1 class="text-2xl font-bold">2FA 验证</h1>
    <p class="text-sm text-slate-500 dark:text-slate-300 mt-1">请输入认证器中显示的 6 位验证码。</p>

    {{if .Error}}
    <div class="mt-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 dark:bg-red-900/30 dark:text-red-200 dark:border-red-700">{{.Error}}</div>
    {{end}}

    <form method="post" action="/auth/verify-2fa" class="mt-5 space-y-4">
      <div>
        <label class="text-sm font-medium" for="code">验证码</label>
        <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required class="mt-1 w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit" class="w-full rounded-lg bg-blue-600 hover:bg-blue-700 text-white py-2 font-medium">验证并进入系统</button>
      <a href="/auth/logout" class="block text-center text-sm text-slate-500 hover:text-slate-700 dark:text-slate-300 dark:hover:text-slate-100">切换账号</a>
    </form>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
