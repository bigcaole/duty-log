<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
  <script id="theme-preload">
    (function(){
      try {
        var pref = localStorage.getItem("theme-preference") || "auto";
        var mode = pref;
        if (pref === "auto") {
          mode = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        if (mode === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        document.documentElement.setAttribute("data-theme-preference", pref);
      } catch (e) {}
    })();
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="min-h-screen lg:grid lg:grid-cols-[260px_1fr]">
    {{template "partials/sidebar.html" .}}
    <main data-app-main="true" class="p-4 md:p-6">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <div class="flex gap-2">
        <a href="/dashboard" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回仪表板</a>
        <a href="/tickets/create" class="px-3 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">新建工单</a>
      </div>
    </div>

    {{if .Msg}}<div class="mb-3 rounded-lg bg-emerald-100 text-emerald-700 px-3 py-2">{{.Msg}}</div>{{end}}
    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-xl shadow">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th class="text-left px-3 py-2">标题</th>
            <th class="text-left px-3 py-2">分类</th>
            <th class="text-left px-3 py-2">状态</th>
            <th class="text-left px-3 py-2">优先级</th>
            <th class="text-left px-3 py-2">创建人</th>
            <th class="text-left px-3 py-2">更新时间</th>
            <th class="text-right px-3 py-2">操作</th>
          </tr>
        </thead>
        <tbody>
          {{range .Items}}
          <tr class="border-t border-gray-100 dark:border-gray-700 align-top">
            <td class="px-3 py-2">
              <div class="font-medium">{{.Title}}</div>
              <div class="text-xs text-gray-500">创建于 {{.CreatedAt}}</div>
            </td>
            <td class="px-3 py-2">{{.CategoryName}}</td>
            <td class="px-3 py-2">
              <span class="px-2 py-1 rounded text-xs bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200">{{.Status}}</span>
            </td>
            <td class="px-3 py-2">
              <span class="px-2 py-1 rounded text-xs bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-200">{{.Priority}}</span>
            </td>
            <td class="px-3 py-2">{{.Creator}}</td>
            <td class="px-3 py-2">{{.UpdatedAt}}</td>
            <td class="px-3 py-2 text-right whitespace-nowrap">
              <a href="/tickets/{{.ID}}" class="text-indigo-600 hover:underline">详情</a>
              <span class="mx-1 text-gray-300">|</span>
              <a href="/tickets/{{.ID}}/edit" class="text-blue-600 hover:underline">编辑</a>
              <form method="post" action="/tickets/{{.ID}}/delete" class="inline" onsubmit="return confirm('确认删除该工单？');">
                <button type="submit" class="ml-2 text-red-600 hover:underline">删除</button>
              </form>
            </td>
          </tr>
          {{else}}
          <tr><td colspan="7" class="px-3 py-6 text-center text-gray-500">暂无工单</td></tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
    </main>
  </div>
</body>
</html>
