<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-3xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">子网自动划分</h1>
      <a href="/ipam/subnets/{{.Subnet.ID}}" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回子网</a>
    </div>

    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4 md:p-6 space-y-4">
      <div class="text-sm text-gray-500">当前子网：{{.Subnet.Network}}</div>
      <form method="post" action="/ipam/subnets/{{.Subnet.ID}}/split" class="space-y-4">
        <div>
          <label class="text-sm text-gray-500">目标子网掩码（例如 24）</label>
          <input name="new_prefix" type="number" value="{{.Form.NewPrefix}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div class="flex gap-2">
          <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">开始划分</button>
          <a href="/ipam/subnets/{{.Subnet.ID}}" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600">取消</a>
        </div>
      </form>
      <div class="text-xs text-gray-500">提示：系统会继承当前子网的单位、速率、VLAN、端口与出口信息。</div>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
