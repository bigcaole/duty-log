<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
  <script id="theme-preload">
    (function(){
      try {
        var pref = localStorage.getItem("theme-preference") || "auto";
        var mode = pref;
        if (pref === "auto") {
          mode = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        if (mode === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        document.documentElement.setAttribute("data-theme-preference", pref);
      } catch (e) {}
    })();
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="min-h-screen lg:grid lg:grid-cols-[260px_1fr]">
    {{template "partials/sidebar.html" .}}
    <main data-app-main="true" class="p-4 md:p-6">
  <div class="max-w-4xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">{{.Title}}</h1>
      <a href="/ipam" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回列表</a>
    </div>

    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <form method="post" action="{{.Action}}" class="bg-white dark:bg-gray-800 rounded-xl shadow p-4 md:p-6 space-y-4">
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm text-gray-500">所属类别</label>
          <select name="section_id" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
            <option value="">请选择</option>
            {{range .Sections}}
            <option value="{{.ID}}" {{if eq $.Form.SectionID .ID}}selected{{end}}>{{.Name}}</option>
            {{end}}
          </select>
        </div>
        <div>
          <label class="text-sm text-gray-500">父子网（可选）</label>
          <select name="parent_id" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
            <option value="">无</option>
            {{range .Subnets}}
            <option value="{{.ID}}" {{if eq $.Form.ParentID (printf "%d" .ID)}}selected{{end}}>{{.Network}}</option>
            {{end}}
          </select>
          <p class="mt-1 text-xs text-gray-500">父子网用于表达“子网隶属于某上级网段”。选择后，子网必须落在父子网范围内，便于层级管理和地图空间展示。</p>
        </div>
      </div>
      <div>
        <label class="text-sm text-gray-500">CIDR</label>
        <input name="network" type="text" value="{{.Form.Network}}" placeholder="例如 10.10.0.0/16" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
      </div>
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm text-gray-500">客户单位名称</label>
          <input name="unit" type="text" value="{{.Form.Unit}}" placeholder="填写客户单位名称" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm text-gray-500">速率 (Mbps)</label>
          <input name="rate_mbps" type="number" min="1" value="{{.Form.RateMbps}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label class="text-sm text-gray-500">VLAN ID</label>
          <input name="vlan_id" type="number" min="1" max="4094" value="{{.Form.VlanID}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm text-gray-500">二层节点端口</label>
          <input name="l2_port" type="text" value="{{.Form.L2Port}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
        <div>
          <label class="text-sm text-gray-500">三层设备</label>
          <input name="egress_device" type="text" value="{{.Form.EgressDevice}}" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">
        </div>
      </div>
      <div>
        <label class="text-sm text-gray-500">说明</label>
        <textarea name="description" rows="3" class="mt-1 w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-3 py-2">{{.Form.Description}}</textarea>
      </div>
      <div class="flex gap-2">
        <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">保存</button>
        <a href="/ipam" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600">取消</a>
      </div>
    </form>
  </div>
  <script src="/static/js/theme.js"></script>
    </main>
  </div>
</body>
</html>
