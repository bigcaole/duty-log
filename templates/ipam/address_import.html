<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-3xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">批量导入地址</h1>
      <a href="/ipam/subnets/{{.Subnet.ID}}/addresses" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回地址列表</a>
    </div>

    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4 md:p-6 space-y-4">
      <div class="text-sm text-gray-500">子网：{{.Subnet.Network}}</div>
      <form method="post" enctype="multipart/form-data" action="/ipam/subnets/{{.Subnet.ID}}/addresses/import" class="space-y-4">
        <input type="file" name="file" accept=".csv" class="block w-full text-sm">
        <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">开始导入</button>
      </form>
      <div class="text-xs text-gray-500">CSV 格式：ip,status,unit,hostname,note（首行可以是表头）</div>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
