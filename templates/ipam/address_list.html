<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class"}</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <h1 class="text-2xl font-bold">IP 地址管理</h1>
      <div class="flex gap-2 flex-wrap">
        <a href="/ipam/subnets/{{.Subnet.ID}}" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">返回子网</a>
        {{if .CanManage}}
        <a href="/ipam/subnets/{{.Subnet.ID}}/addresses/create" class="px-3 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">新增地址</a>
        <a href="/ipam/subnets/{{.Subnet.ID}}/addresses/import" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">批量导入</a>
        <a href="/ipam/subnets/{{.Subnet.ID}}/addresses/template" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">下载模板</a>
        {{end}}
        <a href="/ipam/subnets/{{.Subnet.ID}}/addresses/export" class="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600">导出CSV</a>
      </div>
    </div>

    {{if .Msg}}<div class="mb-3 rounded-lg bg-emerald-100 text-emerald-700 px-3 py-2">{{.Msg}}</div>{{end}}
    {{if .Error}}<div class="mb-3 rounded-lg bg-red-100 text-red-700 px-3 py-2">{{.Error}}</div>{{end}}

    <div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-xl shadow">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 dark:bg-gray-700">
          <tr>
            <th class="px-3 py-2 text-left">IP</th>
            <th class="px-3 py-2 text-left">状态</th>
            <th class="px-3 py-2 text-left">单位</th>
            <th class="px-3 py-2 text-left">主机名</th>
            <th class="px-3 py-2 text-left">备注</th>
            <th class="px-3 py-2 text-left">更新时间</th>
            <th class="px-3 py-2 text-right">操作</th>
          </tr>
        </thead>
        <tbody>
          {{range .Items}}
          <tr class="border-t border-gray-100 dark:border-gray-700">
            <td class="px-3 py-2">{{.IP}}</td>
            <td class="px-3 py-2">{{.Status}}</td>
            <td class="px-3 py-2">{{.Unit}}</td>
            <td class="px-3 py-2">{{.Hostname}}</td>
            <td class="px-3 py-2">{{.Note}}</td>
            <td class="px-3 py-2">{{.UpdatedAt}}</td>
            <td class="px-3 py-2 text-right">
              {{if $.CanManage}}
              <a href="/ipam/addresses/{{.ID}}/edit" class="text-blue-600 hover:underline">编辑</a>
              <form method="post" action="/ipam/addresses/{{.ID}}/delete" class="inline" onsubmit="return confirm('确认删除该地址？');">
                <button type="submit" class="ml-2 text-red-600 hover:underline">删除</button>
              </form>
              {{end}}
            </td>
          </tr>
          {{else}}
          <tr><td class="px-3 py-8 text-center text-gray-500" colspan="7">暂无地址</td></tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
